AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AWS Serverless - CRUD Casas con arquitectura en capas
Parameters:
  DbConnectionString:
    Type: String
    Description: 'Cadena de conexion a PostgreSQL. Ej: Host=...;Port=5432;Database=CasasDB;Username=postgres;Password=...'
    NoEcho: true
Globals:
  Function:
    Runtime: dotnet10
    Architectures:
    - x86_64
    MemorySize: 512
    Timeout: 30
    CodeUri: ./casas-lambda.zip
    Environment:
      Variables:
        POWERTOOLS_SERVICE_NAME: CasasService
        POWERTOOLS_LOG_LEVEL: Info
        POWERTOOLS_LOGGER_CASE: PascalCase
        POWERTOOLS_TRACER_CAPTURE_RESPONSE: true
        POWERTOOLS_TRACER_CAPTURE_ERROR: true
        POWERTOOLS_METRICS_NAMESPACE: CasasService
        DB_CONNECTION_STRING:
          Ref: DbConnectionString
Resources:
  GetAllCasas:
    Type: AWS::Serverless::Function
    Properties:
      Handler: 
        AWSServerlessProjectBack::AWSServerlessProjectBack.Presentation.CasaFunctions::GetAllCasas
      Policies:
      - AWSLambdaBasicExecutionRole
      Events:
        Api:
          Type: Api
          Properties:
            Path: /casas
            Method: GET
      CodeUri: 
        s3://awsserverless-casas-360131674505-us-east-1/casas-lambda/02d84da7a2eaea548b201a59e5743125
  GetCasa:
    Type: AWS::Serverless::Function
    Properties:
      Handler: 
        AWSServerlessProjectBack::AWSServerlessProjectBack.Presentation.CasaFunctions::GetCasa
      Policies:
      - AWSLambdaBasicExecutionRole
      Events:
        Api:
          Type: Api
          Properties:
            Path: /casas/{id}
            Method: GET
      CodeUri: 
        s3://awsserverless-casas-360131674505-us-east-1/casas-lambda/02d84da7a2eaea548b201a59e5743125
  CreateCasa:
    Type: AWS::Serverless::Function
    Properties:
      Handler: 
        AWSServerlessProjectBack::AWSServerlessProjectBack.Presentation.CasaFunctions::CreateCasa
      Policies:
      - AWSLambdaBasicExecutionRole
      Events:
        Api:
          Type: Api
          Properties:
            Path: /casas
            Method: POST
      CodeUri: 
        s3://awsserverless-casas-360131674505-us-east-1/casas-lambda/02d84da7a2eaea548b201a59e5743125
  UpdateCasa:
    Type: AWS::Serverless::Function
    Properties:
      Handler: 
        AWSServerlessProjectBack::AWSServerlessProjectBack.Presentation.CasaFunctions::UpdateCasa
      Policies:
      - AWSLambdaBasicExecutionRole
      Events:
        Api:
          Type: Api
          Properties:
            Path: /casas/{id}
            Method: PUT
      CodeUri: 
        s3://awsserverless-casas-360131674505-us-east-1/casas-lambda/02d84da7a2eaea548b201a59e5743125
  DeleteCasa:
    Type: AWS::Serverless::Function
    Properties:
      Handler: 
        AWSServerlessProjectBack::AWSServerlessProjectBack.Presentation.CasaFunctions::DeleteCasa
      Policies:
      - AWSLambdaBasicExecutionRole
      Events:
        Api:
          Type: Api
          Properties:
            Path: /casas/{id}
            Method: DELETE
      CodeUri: 
        s3://awsserverless-casas-360131674505-us-east-1/casas-lambda/02d84da7a2eaea548b201a59e5743125
Outputs:
  ApiURL:
    Description: URL del endpoint API
    Value:
      Fn::Sub: 
        https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
